<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ page_title }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">{{ page_title }}</ion-title>
    </ion-toolbar>
  </ion-header>

  <section class="section-page">
    <p class="section-kicker">Digital Slate</p>
    <h1>{{ page_title }}</h1>
    <p>{{ page_summary }}</p>
  </section>
</ion-content>
